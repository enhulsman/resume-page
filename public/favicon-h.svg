<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="hulsman.dev favicon">
  <defs>
    <radialGradient id="bg" cx="0.5" cy="0.45" r="0.7">
      <stop offset="0" stop-color="#24222d"/>
      <stop offset="1" stop-color="#1c1a23"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- dot-grid pattern -->
    <pattern id="dots" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="4" r="0.5" fill="rgba(201,148,43,0.08)"/>
    </pattern>
  </defs>

  <!-- dark purple-black background -->
  <rect width="64" height="64" rx="12" fill="url(#bg)"/>

  <!-- subtle dot-grid texture -->
  <rect width="64" height="64" rx="12" fill="url(#dots)"/>

  <!-- H monogram in amber-gold with glow -->
  <g transform="translate(32 32) skewX(-12) translate(-32 -32)" fill="#c9942b" filter="url(#glow)">
    <rect x="18" y="16" width="6" height="32"/>
    <rect x="40" y="16" width="6" height="32"/>
    <rect x="24" y="29" width="16" height="6"/>
  </g>

  <!-- subtle amber inner highlight -->
  <rect x="4" y="4" width="56" height="56" rx="11" fill="none" stroke="rgba(201,148,43,0.08)" stroke-width="1"/>
</svg>
