<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 460" font-family="'SF Mono','Fira Code','Cascadia Code',monospace" font-size="11">
  <style>
    :root {
      --bg: #1c1a23;
      --box: #24222b;
      --border: rgba(255,255,255,0.12);
      --text: #f0ead6;
      --text2: #aaa496;
      --text3: #787068;
      --accent: #c9942b;
      --green: #22c55e;
      --red: #ef4444;
      --blue: #3b82f6;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #fcfaf5;
        --box: #f0ede6;
        --border: #d7d2c8;
        --text: #231e19;
        --text2: #5a5535;
        --text3: #908575;
        --accent: #af7d1e;
        --green: #16a34a;
        --red: #dc2626;
        --blue: #2563eb;
      }
    }
    .bg { fill: var(--bg) }
    .box { fill: var(--box); stroke: var(--border); stroke-width: 1 }
    .box-accent { fill: var(--box); stroke: var(--accent); stroke-width: 1; stroke-opacity: 0.5 }
    .t1 { fill: var(--text); font-size: 11px }
    .t2 { fill: var(--text2); font-size: 10px }
    .t3 { fill: var(--text3); font-size: 9px }
    .label { fill: var(--accent); font-size: 9px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase }
    .line { stroke: var(--border); stroke-width: 1 }
    .line-accent { stroke: var(--accent); stroke-width: 1.5; stroke-dasharray: 6 3 }
    .arrow { stroke: var(--text3); stroke-width: 1; fill: none; marker-end: url(#ah) }
    .arrow-bridge { stroke: var(--accent); stroke-width: 1.5; fill: none; marker-end: url(#ah-accent) }
    .green { fill: var(--green) }
    .red { fill: var(--red) }
  </style>
  <defs>
    <marker id="ah" markerWidth="6" markerHeight="5" refX="5" refY="2.5" orient="auto">
      <path d="M0,0 L6,2.5 L0,5" fill="none" stroke="var(--text3)" stroke-width="1"/>
    </marker>
    <marker id="ah-accent" markerWidth="6" markerHeight="5" refX="5" refY="2.5" orient="auto">
      <path d="M0,0 L6,2.5 L0,5" fill="none" stroke="var(--accent)" stroke-width="1"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="640" height="460" rx="6" class="bg"/>

  <!-- ═══════════ SANDBOX NAMESPACE (top region) ═══════════ -->
  <rect x="16" y="16" width="608" height="186" rx="4" class="box"/>
  <text x="32" y="34" class="label">sandbox namespace</text>
  <text x="210" y="34" class="t3">bubblewrap · --unshare-net · unprivileged user ns</text>

  <!-- Claude Code box -->
  <rect x="40" y="48" width="140" height="36" rx="3" class="box-accent"/>
  <text x="110" y="71" text-anchor="middle" class="t1">Claude Code</text>

  <!-- arrow down to socat -->
  <line x1="110" y1="84" x2="110" y2="110" class="arrow"/>
  <text x="120" y="101" class="t3">tcp :18080</text>

  <!-- socat inside -->
  <rect x="72" y="110" width="76" height="26" rx="3" class="box"/>
  <text x="110" y="127" text-anchor="middle" class="t2">socat</text>

  <!-- arrow down to boundary -->
  <line x1="110" y1="136" x2="110" y2="168" class="arrow-bridge"/>
  <text x="120" y="157" class="t3">unix socket</text>
  <text x="120" y="168" class="t3">(bind-mounted)</text>

  <!-- Filesystem panel (right side) -->
  <rect x="260" y="48" width="348" height="140" rx="3" class="box"/>
  <text x="276" y="66" class="label">filesystem</text>

  <!-- blocked -->
  <circle cx="280" cy="82" r="4" class="red"/>
  <text x="292" y="86" class="t2">~/.ssh  ~/.aws  ~/.gnupg  ~/.docker  +9 more</text>
  <text x="292" y="100" class="t3">→ /dev/null or empty tmpfs</text>

  <!-- read-only -->
  <circle cx="280" cy="116" r="4" fill="var(--blue)"/>
  <text x="292" y="120" class="t2">/usr  /etc  /nix  settings.json</text>
  <text x="292" y="134" class="t3">read-only bind mounts</text>

  <!-- writable -->
  <circle cx="280" cy="150" r="4" class="green"/>
  <text x="292" y="154" class="t2">workspace directory</text>
  <text x="292" y="168" class="t3">TOCTOU-verified: resolve → mount → re-resolve → compare</text>

  <!-- ═══════════ NAMESPACE BOUNDARY ═══════════ -->
  <line x1="16" y1="210" x2="624" y2="210" class="line-accent"/>
  <rect x="245" y="201" width="150" height="18" rx="9" class="bg"/>
  <text x="320" y="214" text-anchor="middle" class="label">namespace boundary</text>

  <!-- ═══════════ HOST (bottom region) ═══════════ -->
  <rect x="16" y="218" width="608" height="226" rx="4" class="box"/>
  <text x="32" y="236" class="label">host</text>

  <!-- socat outside -->
  <line x1="110" y1="218" x2="110" y2="240" class="arrow-bridge"/>
  <rect x="72" y="240" width="76" height="26" rx="3" class="box"/>
  <text x="110" y="257" text-anchor="middle" class="t2">socat</text>

  <!-- arrow to proxy -->
  <line x1="110" y1="266" x2="110" y2="290" class="arrow"/>
  <text x="120" y="282" class="t3">tcp :random</text>

  <!-- Egress proxy box -->
  <rect x="40" y="290" width="560" height="56" rx="3" class="box-accent"/>
  <text x="56" y="310" class="t1">egress-proxy.py</text>
  <text x="188" y="310" class="t3">pure stdlib · 0 dependencies · ~300 lines</text>
  <text x="56" y="330" class="t2">HTTP/CONNECT domain allowlist</text>
  <text x="260" y="330" class="t2">JSON-lines audit log</text>
  <text x="420" y="330" class="t2">post-session risk scoring</text>

  <!-- arrow to filtering outcome -->
  <line x1="160" y1="346" x2="160" y2="382" class="arrow"/>
  <line x1="440" y1="346" x2="440" y2="382" class="arrow"/>

  <!-- allowed -->
  <circle cx="148" cy="392" r="4" class="green"/>
  <text x="158" y="396" class="t2">github.com  pypi.org  +43 domains</text>
  <text x="158" y="412" class="t3">→ internet</text>

  <!-- blocked -->
  <circle cx="428" cy="392" r="4" class="red"/>
  <text x="438" y="396" class="t2">everything else</text>
  <text x="438" y="412" class="t3">→ connection refused</text>
</svg>
